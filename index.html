<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HidzScale | Professional AI Upscaler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        midnight: '#05070a',
                        accent: '#3b82f6',
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '3rem',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-midnight text-white min-h-screen flex flex-col font-sans">

    <!-- Header / Nav -->
    <nav class="w-full max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter text-accent italic uppercase">Generator</h1>
        <button id="themeToggle" class="border border-slate-800 px-4 py-1.5 rounded-full text-[10px] font-bold tracking-widest flex items-center gap-2 hover:bg-white hover:text-black transition-all">
            <span id="themeText">☀️ TERANG</span>
        </button>
    </nav>

    <!-- Main Section -->
    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            
            <!-- Kiri: Info & Upload -->
            <div class="space-y-8">
                <div class="space-y-2">
                    <h2 class="text-5xl md:text-6xl font-bold leading-tight tracking-tight">
                        Art Generation <br>
                        <span class="text-accent underline decoration-wavy decoration-2 underline-offset-8">Redefined.</span>
                    </h2>
                    <p class="text-slate-400 text-lg">Buat gambar profesional hanya dengan kecerdasan AI.</p>
                </div>

                <!-- Input Box Style -->
                <div class="bg-[#0f1218] border border-slate-800 p-6 rounded-4xl shadow-2xl">
                    <div id="dropZone" class="group min-h-[150px] flex flex-col items-center justify-center cursor-pointer border-2 border-dashed border-transparent hover:border-accent/30 rounded-3xl transition-all">
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                        <p id="fileStatus" class="text-slate-500 font-medium">Klik untuk upload gambar lu...</p>
                    </div>
                    
                    <button id="upscaleBtn" class="w-full mt-6 bg-accent hover:bg-blue-600 text-white font-bold py-4 rounded-3xl tracking-widest uppercase text-sm transition-transform active:scale-95 shadow-lg shadow-accent/20">
                        GENERATE IMAGE
                    </button>
                </div>
            </div>

            <!-- Kanan: Preview Box -->
            <div class="relative group">
                <div class="bg-[#0f1218] aspect-square rounded-5xl border-[12px] border-slate-900/50 flex items-center justify-center overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                    <img id="mainPreview" class="w-full h-full object-cover hidden" src="" alt="Preview">
                    
                    <!-- Default Placeholder (Logo H.) -->
                    <div id="placeholder" class="text-slate-800 text-[12rem] font-black italic select-none">
                        H.
                    </div>

                    <!-- Loading Overlay -->
                    <div id="loadingOverlay" class="absolute inset-0 bg-midnight/80 hidden flex flex-col items-center justify-center gap-4">
                        <div class="w-12 h-12 border-4 border-accent border-t-transparent rounded-full animate-spin"></div>
                        <p class="text-accent font-bold tracking-widest text-xs">PROCESSING...</p>
                    </div>
                </div>

                <!-- Download Floating Button -->
                <a id="downloadBtn" class="hidden absolute -bottom-4 -right-4 bg-white text-black p-4 rounded-2xl shadow-xl hover:scale-110 transition-transform cursor-pointer">
                    <i data-lucide="download" class="w-6 h-6"></i>
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full max-w-7xl mx-auto px-8 py-10 flex flex-col md:flex-row justify-between items-center gap-6 border-t border-slate-900">
        <div class="text-left">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Created by</p>
            <p class="font-black text-lg">Hidzzy</p>
        </div>
        
        <div class="flex gap-3">
            <button class="bg-[#0f1218] border border-slate-800 px-6 py-2 rounded-xl text-[10px] font-bold tracking-widest hover:bg-slate-800 transition-all">GITHUB</button>
            <button class="bg-[#0f1218] border border-slate-800 px-6 py-2 rounded-xl text-[10px] font-bold tracking-widest hover:bg-slate-800 transition-all">TELEGRAM</button>
            <button class="bg-[#0f1218] border border-slate-800 px-6 py-2 rounded-xl text-[10px] font-bold tracking-widest hover:bg-slate-800 transition-all">MAIL</button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
